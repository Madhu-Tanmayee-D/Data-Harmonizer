[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "viewer"

[server]
maxUploadSize = 100
enableXsrfProtection = true
headless = true
enableCORS = false

[logger]
level = "info"

[browser]
gatherUsageStats = false
